<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Profil — Sigma MDX</title>
  <meta name="theme-color" content="#060912" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    .profile-wrap { max-width: 640px; margin: 0 auto; padding: 3.5rem 1.5rem 6rem; }

    .profile-hero { text-align: center; margin-bottom: 3rem; }
    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(0,230,118,.2), rgba(167,139,250,.2));
      border: 2px solid rgba(0,230,118,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin: 0 auto 1.25rem;
    }
    .profile-hero h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem; font-weight: 700; letter-spacing: -.03em;
      margin-bottom: .35rem;
    }
    .profile-hero p { color: var(--text-muted); font-size: .9rem; }

    .profile-plan-badge {
      display: inline-flex; align-items: center; gap: .4rem;
      background: rgba(0,230,118,.09); border: 1px solid rgba(0,230,118,.22);
      border-radius: 999px; padding: .25rem .85rem;
      font-size: .73rem; font-weight: 700; color: #00e676;
      margin-top: .6rem;
    }
    .profile-plan-badge.pro { background: rgba(167,139,250,.12); border-color: rgba(167,139,250,.3); color: #a78bfa; }

    .profile-card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 1.75rem 2rem;
      margin-bottom: 1.5rem;
      transition: border-color .2s;
    }
    .profile-card:hover { border-color: rgba(0,230,118,.2); }
    .profile-card-title {
      font-size: .8rem; font-weight: 700; letter-spacing: .08em;
      color: #00e676; text-transform: uppercase; margin-bottom: 1.5rem;
    }

    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block; font-size: .82rem; font-weight: 600;
      color: #8a9ab0; margin-bottom: .4rem;
    }
    .form-group input {
      width: 100%; background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px; padding: .7rem 1rem;
      color: #f0f6ff; font-size: .9rem; font-family: inherit;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .form-group input:focus {
      border-color: rgba(0,230,118,.5);
      box-shadow: 0 0 0 3px rgba(0,230,118,.08);
    }
    .form-group input::placeholder { color: #4a5a6a; }

    .pass-wrap { position: relative; }
    .pass-wrap input { padding-right: 2.8rem; }
    .pass-toggle {
      position: absolute; right: .75rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: #6b8095; padding: .2rem;
      display: flex; align-items: center; transition: color .2s;
    }
    .pass-toggle:hover { color: #00e676; }

    .save-btn {
      background: linear-gradient(135deg, #00c853, #00e676);
      border: none; border-radius: 12px; padding: .8rem 2rem;
      color: #000; font-size: .9rem; font-weight: 700;
      cursor: pointer; transition: opacity .2s;
      display: flex; align-items: center; gap: .5rem;
    }
    .save-btn:hover { opacity: .88; }
    .save-btn:disabled { opacity: .5; cursor: not-allowed; }

    .danger-btn {
      background: rgba(255,77,109,.08); border: 1px solid rgba(255,77,109,.25);
      border-radius: 12px; padding: .75rem 1.5rem;
      color: #ff4d6d; font-size: .88rem; font-weight: 600;
      cursor: pointer; transition: all .2s;
    }
    .danger-btn:hover { background: rgba(255,77,109,.15); border-color: rgba(255,77,109,.4); }

    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: #0c1018; border: 1px solid rgba(0,230,118,.3);
      border-radius: 12px; padding: .75rem 1.25rem;
      font-size: .87rem; font-weight: 600; color: #00e676;
      display: none; z-index: 999; box-shadow: 0 8px 32px rgba(0,0,0,.4);
      animation: fadeIn .25s ease;
    }
    .toast.error { border-color: rgba(255,77,109,.3); color: #ff4d6d; }
    .toast.show { display: block; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .profile-stat-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 1rem;
      margin-bottom: .25rem;
    }
    .profile-stat {
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.06);
      border-radius: 12px; padding: .9rem 1.1rem; text-align: center;
    }
    .profile-stat .val { font-size: 1.5rem; font-weight: 800; color: #00e676; }
    .profile-stat .lbl { font-size: .72rem; color: #6b8095; margin-top: .15rem; }
  </style>
</head>
<body class="grid-bg">

  <header class="navbar">
    <a href="/" class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.102.546 4.07 1.5 5.78L.057 23.617a.75.75 0 0 0 .934.876l6.141-1.608A11.953 11.953 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.731 9.731 0 0 1-4.953-1.353l-.354-.213-3.642.955.97-3.546-.232-.365A9.708 9.708 0 0 1 2.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/></svg>
      </div>
      <span class="logo-name">Sigma <span>MDX</span></span>
    </a>
    <nav id="nav-links">
      <a href="/builder.html">Créateur</a>
      <a href="/vps.html">Mes Bots</a>
      <a href="/status.html">Statut VPS</a>
      <a href="/profile.html" style="color:#00e676">Mon Profil</a>
    </nav>
    <div class="navbar-end">
      <button class="lang-btn" style="cursor:pointer;background:none;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:.3rem .7rem;color:#8a9ab0;font-size:.8rem" onclick="window.location.href='/vps.html'">← Retour</button>
    </div>
  </header>

  <main>
    <div class="profile-wrap">

      <!-- Hero -->
      <div class="profile-hero">
        <div class="profile-avatar">🤖</div>
        <h1 id="profileName">Mon Profil</h1>
        <p id="profileEmail" style="color:#8a9ab0;font-size:.9rem">Chargement...</p>
        <div id="planBadge" class="profile-plan-badge">FREE</div>
      </div>

      <!-- Stats -->
      <div class="profile-card">
        <div class="profile-card-title">Statistiques</div>
        <div class="profile-stat-grid">
          <div class="profile-stat">
            <div class="val" id="statBots">—</div>
            <div class="lbl">Bots actifs</div>
          </div>
          <div class="profile-stat">
            <div class="val" id="statMax">—</div>
            <div class="lbl">Limite bots</div>
          </div>
          <div class="profile-stat">
            <div class="val" id="statPlan">—</div>
            <div class="lbl">Plan</div>
          </div>
          <div class="profile-stat">
            <div class="val" id="statMember">—</div>
            <div class="lbl">Membre depuis</div>
          </div>
        </div>
      </div>

      <!-- Infos générales -->
      <div class="profile-card">
        <div class="profile-card-title">Informations du compte</div>
        <div class="form-group">
          <label>Adresse email</label>
          <input type="email" id="inpEmail" placeholder="votre@email.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Numéro WhatsApp (avec indicatif)</label>
          <input type="tel" id="inpPhone" placeholder="+212600000000" autocomplete="tel" />
        </div>
        <button class="save-btn" id="saveInfoBtn" onclick="saveInfo()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Sauvegarder les infos
        </button>
      </div>

      <!-- Mot de passe -->
      <div class="profile-card">
        <div class="profile-card-title">Changer le mot de passe</div>
        <div class="form-group">
          <label>Mot de passe actuel</label>
          <div class="pass-wrap">
            <input type="password" id="inpCurrentPass" placeholder="••••••••" autocomplete="current-password" />
            <button class="pass-toggle" onclick="togglePass('inpCurrentPass', this)" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label>Nouveau mot de passe</label>
          <div class="pass-wrap">
            <input type="password" id="inpNewPass" placeholder="Min. 6 caractères" autocomplete="new-password" />
            <button class="pass-toggle" onclick="togglePass('inpNewPass', this)" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label>Confirmer le nouveau mot de passe</label>
          <div class="pass-wrap">
            <input type="password" id="inpConfirmPass" placeholder="Répétez le nouveau mot de passe" autocomplete="new-password" />
            <button class="pass-toggle" onclick="togglePass('inpConfirmPass', this)" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button class="save-btn" id="savePassBtn" onclick="savePassword()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Changer le mot de passe
        </button>
      </div>

      <!-- Danger zone -->
      <div class="profile-card">
        <div class="profile-card-title" style="color:#ff4d6d">Zone dangereuse</div>
        <p style="color:#8a9ab0;font-size:.87rem;margin-bottom:1rem">La déconnexion supprimera votre session locale sur cet appareil.</p>
        <button class="danger-btn" onclick="doLogout()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline;vertical-align:middle;margin-right:.35rem"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Se déconnecter
        </button>
      </div>

    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    const token = localStorage.getItem('sigma_token');
    if (!token) window.location.href = '/login.html';

    async function authFetch(url, opts = {}) {
      return fetch(url, { ...opts, headers: { ...(opts.headers || {}), 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' } });
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (isError ? ' error' : '');
      clearTimeout(t._to);
      t._to = setTimeout(() => t.classList.remove('show'), 3500);
    }

    function togglePass(id, btn) {
      const inp = document.getElementById(id);
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      btn.innerHTML = show
        ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
        : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    }

    function doLogout() {
      localStorage.removeItem('sigma_token');
      localStorage.removeItem('sigma_user');
      localStorage.removeItem('sigma_onboarded');
      window.location.href = '/login.html';
    }

    async function loadProfile() {
      try {
        const r = await authFetch('/api/auth/me');
        if (!r.ok) return doLogout();
        const d = await r.json();
        const u = d.user;

        document.getElementById('profileName').textContent = u.email.split('@')[0];
        document.getElementById('profileEmail').textContent = u.email;
        document.getElementById('inpEmail').value = u.email;
        document.getElementById('inpPhone').value = u.phone || '';

        const badge = document.getElementById('planBadge');
        badge.textContent = (u.plan || 'free').toUpperCase();
        if (u.plan === 'pro' || u.plan === 'enterprise') badge.classList.add('pro');

        document.getElementById('statMax').textContent = u.maxBots || 1;
        document.getElementById('statPlan').textContent = (u.plan || 'FREE').toUpperCase();

        const sessR = await authFetch('/api/vps/sessions');
        if (sessR.ok) {
          const sessions = await sessR.json();
          const active = sessions.filter(s => s.status === 'connected').length;
          document.getElementById('statBots').textContent = active;
        }

        const since = u.createdAt ? new Date(u.createdAt).toLocaleDateString('fr-FR', { month: 'short', year: 'numeric' }) : '—';
        document.getElementById('statMember').textContent = since;

      } catch (_) { showToast('Erreur de chargement.', true); }
    }

    async function saveInfo() {
      const btn = document.getElementById('saveInfoBtn');
      btn.disabled = true;
      btn.textContent = 'Sauvegarde...';
      try {
        const r = await authFetch('/api/auth/me', {
          method: 'PUT',
          body: JSON.stringify({
            email: document.getElementById('inpEmail').value.trim(),
            phone: document.getElementById('inpPhone').value.trim(),
          }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        if (d.user?.email) {
          const stored = JSON.parse(localStorage.getItem('sigma_user') || '{}');
          stored.email = d.user.email;
          stored.phone = d.user.phone;
          localStorage.setItem('sigma_user', JSON.stringify(stored));
        }
        showToast('✅ Informations sauvegardées');
        await loadProfile();
      } catch (err) {
        showToast(err.message, true);
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Sauvegarder les infos`;
      }
    }

    async function savePassword() {
      const current = document.getElementById('inpCurrentPass').value;
      const np = document.getElementById('inpNewPass').value;
      const confirm = document.getElementById('inpConfirmPass').value;
      if (!current || !np) return showToast('Remplissez tous les champs.', true);
      if (np !== confirm) return showToast('Les mots de passe ne correspondent pas.', true);
      if (np.length < 6) return showToast('Mot de passe trop court (min 6 caractères).', true);

      const btn = document.getElementById('savePassBtn');
      btn.disabled = true;
      btn.textContent = 'Mise à jour...';
      try {
        const r = await authFetch('/api/auth/me', {
          method: 'PUT',
          body: JSON.stringify({ currentPassword: current, newPassword: np }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        showToast('✅ Mot de passe mis à jour');
        document.getElementById('inpCurrentPass').value = '';
        document.getElementById('inpNewPass').value = '';
        document.getElementById('inpConfirmPass').value = '';
      } catch (err) {
        showToast(err.message, true);
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Changer le mot de passe`;
      }
    }

    loadProfile();
  </script>
</body>
</html>
